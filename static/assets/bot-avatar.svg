<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <keySpline id="ease" values="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </defs>

    <circle cx="100" cy="100" r="95" fill="#1CB0F6" />

    <ellipse cx="100" cy="165" rx="40" ry="8" fill="#1483B8">
        <animate attributeName="rx" values="45; 35; 45" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" dur="3s" repeatCount="indefinite" />
        <animate attributeName="ry" values="8; 6; 8" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1; 0.6; 1" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" dur="3s" repeatCount="indefinite" />
    </ellipse>

    <g id="bot">
        <animateTransform 
            attributeName="transform" 
            type="translate" 
            values="0,0; 0,-8; 0,0" 
            keyTimes="0; 0.5; 1" 
            calcMode="spline" 
            keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" 
            dur="3s" 
            repeatCount="indefinite" />

        <line x1="100" y1="40" x2="100" y2="15" stroke="#A5EDFF" stroke-width="6" stroke-linecap="round" />
        <circle cx="100" cy="13" r="8" fill="#D33131" />
        <circle cx="100" cy="11" r="8" fill="#FF4B4B" />
        <circle cx="100" cy="11" r="14" fill="#FFFFFF" opacity="0.3">
            <animate attributeName="opacity" values="0.1; 0.6; 0.1" dur="1.5s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" origin="100 11" dur="1.5s" repeatCount="indefinite" />
        </circle>

        <rect x="75" y="135" width="14" height="20" rx="7" fill="#D3A600" />
        <rect x="75" y="132" width="14" height="20" rx="7" fill="#FFC800" />
        <rect x="111" y="135" width="14" height="20" rx="7" fill="#D3A600" />
        <rect x="111" y="132" width="14" height="20" rx="7" fill="#FFC800" />

        <g>
            <animateTransform attributeName="transform" type="rotate" values="0 55 95; 15 55 95; 0 55 95" dur="2s" repeatCount="indefinite" />
            <path d="M 55 95 Q 25 100 35 125 Z" fill="#E5E5E5" />
            <path d="M 55 90 Q 25 95 35 120 Z" fill="#FFFFFF" />
        </g>
        <g>
            <animateTransform attributeName="transform" type="rotate" values="0 145 95; -15 145 95; 0 145 95" dur="2s" repeatCount="indefinite" />
            <path d="M 145 95 Q 175 100 165 125 Z" fill="#E5E5E5" />
            <path d="M 145 90 Q 175 95 165 120 Z" fill="#FFFFFF" />
        </g>

        <rect x="50" y="60" width="100" height="85" rx="40" fill="#E5E5E5" />
        <rect x="50" y="55" width="100" height="85" rx="40" fill="#FFFFFF" />

        <path d="M 85 55 L 85 72 Q 100 78 115 72 L 115 55 Z" fill="#111B21" />
        <path d="M 85 52 L 85 69 Q 100 75 115 69 L 115 52 Z" fill="#202F36" />
        <path d="M 68 53 L 100 38 L 132 53 L 100 68 Z" fill="#111B21" />
        <path d="M 68 50 L 100 35 L 132 50 L 100 65 Z" fill="#202F36" />
        
        <g>
            <animateTransform attributeName="transform" type="rotate" values="0 100 48; 12 100 48; 0 100 48; -8 100 48; 0 100 48" dur="3s" repeatCount="indefinite" />
            <line x1="100" y1="48" x2="120" y2="58" stroke="#FFC800" stroke-width="3" stroke-linecap="round" />
            <path d="M 118 57 L 126 68 L 114 68 Z" fill="#D3A600" />
            <path d="M 118 55 L 126 66 L 114 66 Z" fill="#FFC800" />
        </g>
        <circle cx="100" cy="50" r="4" fill="#D3A600" />
        <circle cx="100" cy="48" r="4" fill="#FFC800" />

        <rect x="65" y="102" width="70" height="30" rx="10" fill="#111B21" />
        <rect x="65" y="100" width="70" height="30" rx="10" fill="#202F36" />
        
        <circle cx="85" cy="115" r="4" fill="#58CC02">
            <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0s" repeatCount="indefinite" />
        </circle>
        <circle cx="100" cy="115" r="4" fill="#58CC02">
            <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite" />
        </circle>
        <circle cx="115" cy="115" r="4" fill="#58CC02">
            <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
        </circle>

        <ellipse cx="80" cy="80" rx="10" ry="14" fill="#4B4B4B">
            <animate attributeName="ry" values="14; 14; 2; 14; 14" keyTimes="0; 0.45; 0.5; 0.55; 1" dur="4s" repeatCount="indefinite" />
        </ellipse>
        <circle cx="77" cy="75" r="3" fill="#FFFFFF">
            <animate attributeName="opacity" values="1; 1; 0; 1; 1" keyTimes="0; 0.45; 0.5; 0.55; 1" dur="4s" repeatCount="indefinite" />
        </circle>

        <ellipse cx="120" cy="80" rx="10" ry="14" fill="#4B4B4B">
            <animate attributeName="ry" values="14; 14; 2; 14; 14" keyTimes="0; 0.45; 0.5; 0.55; 1" dur="4s" repeatCount="indefinite" />
        </ellipse>
        <circle cx="117" cy="75" r="3" fill="#FFFFFF">
            <animate attributeName="opacity" values="1; 1; 0; 1; 1" keyTimes="0; 0.45; 0.5; 0.55; 1" dur="4s" repeatCount="indefinite" />
        </circle>

        <path d="M 92 88 L 108 88 L 100 98 Z" fill="#D3A600" />
        <path d="M 92 85 L 108 85 L 100 95 Z" fill="#FFC800" />
    </g>
</svg>